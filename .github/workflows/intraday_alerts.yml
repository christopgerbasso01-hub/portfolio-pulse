name: Intraday Portfolio Alerts

on:
  schedule:
    # Every 10 min during NYSE market hours (9:30 AM – 4:00 PM ET = 13:30 – 20:00 UTC), Mon–Fri
    # Using explicit minutes to avoid GitHub Actions cron throttling with */N syntax
    - cron: '0,10,20,30,40,50 14 * * 1-5'
    - cron: '0,10,20,30,40,50 15 * * 1-5'
    - cron: '0,10,20,30,40,50 16 * * 1-5'
    - cron: '0,10,20,30,40,50 17 * * 1-5'
    - cron: '0,10,20,30,40,50 18 * * 1-5'
    - cron: '0,10,20,30,40,50 19 * * 1-5'
    # 9:30–10am ET window (13:30–14:00 UTC)
    - cron: '30,40,50 13 * * 1-5'
  workflow_dispatch:   # Manual trigger for testing

jobs:
  intraday-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check intraday alerts
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://portfolio-pulse-dun.vercel.app/api/intraday)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Intraday status: $HTTP_CODE"
          echo "Intraday response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Warning: intraday check returned $HTTP_CODE"
          fi
