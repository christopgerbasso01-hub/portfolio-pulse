name: Daily Portfolio Snapshot & Notify

on:
  schedule:
    # 9:30 PM UTC = 5:30 PM ET — ~90 min after NYSE close, Mon–Fri
    - cron: '30 21 * * 1-5'
  workflow_dispatch:   # Manual trigger from GitHub Actions UI

jobs:
  snapshot-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Take portfolio snapshot
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://portfolio-pulse-dun.vercel.app/api/snapshot)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Snapshot status: $HTTP_CODE"
          echo "Snapshot response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Snapshot failed with status $HTTP_CODE"
            exit 1
          fi

      - name: Send end-of-day push notifications
        run: |
          # Brief pause to ensure snapshot is committed to KV
          sleep 4

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://portfolio-pulse-dun.vercel.app/api/notify)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Notify status: $HTTP_CODE"
          echo "Notify response: $BODY"

          # Non-fatal — "no subscribers" returns 200 anyway
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Warning: notify returned $HTTP_CODE"
          fi
