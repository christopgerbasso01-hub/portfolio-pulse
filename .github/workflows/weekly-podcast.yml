name: Weekly Podcast

on:
  workflow_dispatch:  # Triggered by cron-job.org every Monday 6:00 AM UTC

permissions:
  contents: write

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 35   # Kokoro synthesis needs ~15-20 min for a 15-20 min episode

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ffmpeg is pre-installed on GitHub Actions ubuntu-latest — no install needed

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests edge-tts mutagen

      - name: Generate podcast
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          CRON_SECRET:   ${{ secrets.CRON_SECRET }}
        run: python scripts/generate_podcast.py

      - name: Commit and push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/podcast_ep*.mp3 data/podcast_meta.json
          git diff --staged --quiet \
            && echo "No changes — skipping commit" \
            || git commit -m "chore: weekly podcast ep $(date -u +'%Y-%m-%d')"
          git push

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     team_cBG29NHHnnkVTbkmZOjZ7RCy
          VERCEL_PROJECT_ID: prj_dpklrWAGa5FSVf6yOltJM3aJgtn9
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping Vercel deployment"
            exit 0
          fi
          npm install -g vercel@latest --quiet
          vercel --prod --yes --token "$VERCEL_TOKEN"
          echo "✓ Deployed to Vercel"
