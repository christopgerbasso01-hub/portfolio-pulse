name: Intraday Portfolio Alerts

on:
  schedule:
    # Every 5 min during NYSE market hours (9:30 AM – 4:00 PM ET = 13:30 – 20:00 UTC), Mon–Fri
    # GitHub Actions minimum is 5 minutes. Uses ~1,700 min/month (well within 2,000 free tier).
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:   # Manual trigger for testing

jobs:
  intraday-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check intraday alerts
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://portfolio-pulse-dun.vercel.app/api/intraday)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Intraday status: $HTTP_CODE"
          echo "Intraday response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Warning: intraday check returned $HTTP_CODE"
          fi
