name: Update Portfolio Prices

on:
  schedule:
    # Every 30 min on weekdays during market hours (9am–5pm ET = 13:00–21:00 UTC)
    - cron: '0,30 13-21 * * 1-5'
  workflow_dispatch:   # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
