<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Pulse</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      text-align: center;
    }

    .tabs {
      display: flex;
      justify-content: center;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .tab {
      padding: 12px 20px;
      cursor: pointer;
      color: #94a3b8;
    }

    .tab.active {
      color: white;
      border-bottom: 2px solid #38bdf8;
    }

    .container {
      padding: 20px;
      max-width: 1300px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }

    .card h3 {
      margin: 0 0 10px;
      color: #94a3b8;
      font-size: 13px;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
    }

    .positive { color: #22c55e; }
    .negative { color: #ef4444; }

    canvas {
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }

    .section-title {
      margin: 20px 0 10px;
      font-size: 16px;
      color: #cbd5f5;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<header>📊 Portfolio Pulse Dashboard</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">Overview</div>
  <div class="tab" onclick="switchTab('hybrid')">Hybrid</div>
</div>

<div class="container">

  <!-- OVERVIEW TAB -->
  <div id="overview">

    <div class="grid">
      <div class="card">
        <h3>Total Portfolio Value</h3>
        <div id="portfolioValue" class="value">$0</div>
      </div>

      <div class="card">
        <h3>Total Gain / Loss</h3>
        <div id="totalPL" class="value positive">0%</div>
      </div>

      <div class="card">
        <h3>Day Change</h3>
        <div id="dayChange" class="value">0%</div>
      </div>

      <div class="card">
        <h3>Top Performer</h3>
        <div id="topStock" class="value">-</div>
      </div>
    </div>

    <div class="section-title">Portfolio Growth</div>
    <canvas id="performanceChart" height="100"></canvas>

    <div class="section-title">Asset Allocation</div>
    <canvas id="allocationChart" height="100"></canvas>

  </div>

  <!-- HYBRID TAB -->
  <div id="hybrid" class="hidden">

    <div class="grid">
      <div class="card">
        <h3>Equities</h3>
        <div id="equityValue" class="value">$0</div>
      </div>

      <div class="card">
        <h3>Cash</h3>
        <div id="cashValue" class="value">$0</div>
      </div>

      <div class="card">
        <h3>Risk Score</h3>
        <div id="riskScore" class="value">0</div>
      </div>

      <div class="card">
        <h3>Diversification</h3>
        <div id="diversification" class="value">0%</div>
      </div>
    </div>

    <div class="section-title">Hybrid Performance (Live)</div>
    <canvas id="hybridChart" height="100"></canvas>

  </div>

</div>

<script>
  function switchTab(tab) {
    document.getElementById("overview").classList.add("hidden");
    document.getElementById("hybrid").classList.add("hidden");

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

    document.getElementById(tab).classList.remove("hidden");
    event.target.classList.add("active");
  }

  // SAMPLE DATA (replace with your API/data)
  const portfolioData = {
    value: 125000,
    pl: 12.5,
    day: -0.7,
    top: "NVDA",
    history: [100,105,110,108,120,125],
    allocation: [60, 25, 15] // stocks, cash, other
  };

  // UPDATE METRICS
  document.getElementById("portfolioValue").innerText = "$" + portfolioData.value.toLocaleString();
  document.getElementById("totalPL").innerText = portfolioData.pl + "%";
  document.getElementById("dayChange").innerText = portfolioData.day + "%";
  document.getElementById("topStock").innerText = portfolioData.top;

  if (portfolioData.pl < 0) {
    document.getElementById("totalPL").classList.add("negative");
  }

  // PERFORMANCE CHART
  new Chart(document.getElementById("performanceChart"), {
    type: "line",
    data: {
      labels: ["Jan","Feb","Mar","Apr","May","Jun"],
      datasets: [{
        label: "Portfolio Value",
        data: portfolioData.history,
      }]
    }
  });

  // ALLOCATION CHART
  new Chart(document.getElementById("allocationChart"), {
    type: "doughnut",
    data: {
      labels: ["Stocks","Cash","Other"],
      datasets: [{
        data: portfolioData.allocation
      }]
    }
  });

  // HYBRID CHART
  new Chart(document.getElementById("hybridChart"), {
    type: "bar",
    data: {
      labels: ["Model","Actual"],
      datasets: [{
        label: "Performance",
        data: [12, 10]
      }]
    }
  });
</script>

</body>
</html>
