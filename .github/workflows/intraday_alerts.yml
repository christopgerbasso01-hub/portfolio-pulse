name: Intraday Portfolio Alerts

on:
  workflow_dispatch:   # Manual trigger only — scheduling handled by cron-job.org

jobs:
  intraday-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check intraday alerts
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://portfolio-pulse-dun.vercel.app/api/intraday)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Intraday status: $HTTP_CODE"
          echo "Intraday response: $BODY"
