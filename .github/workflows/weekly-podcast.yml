name: Weekly Podcast

on:
  schedule:
    # Every Monday 6:00 AM UTC = 8:00 AM CEST (Geneva summer)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests edge-tts

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Generate podcast
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_podcast.py

      - name: Commit and push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/podcast.mp3 data/podcast_meta.json
          git diff --staged --quiet \
            && echo "No changes — skipping commit" \
            || git commit -m "chore: weekly podcast ep $(date -u +'%Y-%m-%d')"
          git push
