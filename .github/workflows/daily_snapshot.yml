name: Daily Portfolio Snapshot

on:
  schedule:
    # 9:30 PM UTC = 5:30 PM ET — 90 min after NYSE close, Mon–Fri
    # Captures final closing prices after after-hours dust settles
    - cron: '30 21 * * 1-5'
  workflow_dispatch:   # Manual trigger from GitHub Actions UI for testing

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Take portfolio snapshot
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://portfolio-pulse-dun.vercel.app/api/snapshot)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Snapshot failed with status $HTTP_CODE"
            exit 1
          fi
